<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover"/>
<title>THM Tráfico</title>
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@400;500;600&display=swap');
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{background:#0c0c0c;color:#eeeae3;font-family:'DM Sans',sans-serif}
.home{min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:32px 24px;position:relative;overflow:hidden;background:#0c0c0c}
.home::before{content:'';position:absolute;top:-30%;right:-20%;width:60%;height:60%;background:radial-gradient(circle,rgba(180,30,30,.13)0%,transparent 70%);pointer-events:none}
.logo{font-family:'Bebas Neue',sans-serif;font-size:52px;letter-spacing:8px;margin-bottom:2px}
.logo-sub{font-size:10px;letter-spacing:4px;text-transform:uppercase;color:#555;margin-bottom:60px}
.hl{font-size:11px;letter-spacing:3px;text-transform:uppercase;color:#555;margin-bottom:14px}
.sgrid{display:grid;grid-template-columns:1fr 1fr;gap:10px;width:100%;max-width:340px;margin-bottom:44px}
.sb{background:#151515;border:1px solid #222;color:#eeeae3;padding:18px 10px;font-family:'DM Sans',sans-serif;font-size:13px;font-weight:500;border-radius:10px;cursor:pointer;transition:all .15s;text-align:center}
.sb:active{background:#b41e1e;border-color:#b41e1e;transform:scale(.96)}
.ae{font-size:11px;letter-spacing:2px;text-transform:uppercase;color:#383838;background:none;border:none;cursor:pointer;padding:8px;font-family:'DM Sans',sans-serif}
.ctr{min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px;user-select:none;position:relative;background:#0c0c0c}
.bk{position:absolute;top:20px;left:20px;background:none;border:none;color:#444;font-size:22px;cursor:pointer;padding:8px}
.cs{font-family:'Bebas Neue',sans-serif;font-size:30px;letter-spacing:4px;color:#555;margin-bottom:2px}
.cds{font-size:11px;letter-spacing:2px;text-transform:uppercase;color:#383838;margin-bottom:52px}
.ring{width:260px;height:260px;border-radius:50%;border:1px solid #1a1a1a;display:flex;align-items:center;justify-content:center}
.tb{width:228px;height:228px;border-radius:50%;background:#141414;border:2px solid #222;cursor:pointer;display:flex;flex-direction:column;align-items:center;justify-content:center;transition:all .1s;-webkit-user-select:none;border:none;outline:none}
.tb.p{background:#b41e1e;transform:scale(.92)}
.tc{font-family:'Bebas Neue',sans-serif;font-size:100px;line-height:1;letter-spacing:-2px;color:#eeeae3}
.tl{font-size:10px;letter-spacing:3px;text-transform:uppercase;color:#555;margin-top:2px}
.sr{display:flex;align-items:center;gap:8px;margin-top:20px}
.sd{width:7px;height:7px;border-radius:50%;flex-shrink:0}
.sd.ok{background:#2d7a55}.sd.error{background:#c33}.sd.idle{background:#333}.sd.loading{background:#555;animation:pls 1s ease-in-out infinite}
@keyframes pls{0%,100%{opacity:1}50%{opacity:.25}}
.sl{font-size:11px;color:#444;letter-spacing:1px}
.lt{margin-top:6px;font-size:12px;color:#383838;min-height:18px;text-align:center}
.pw{min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:32px;background:#0c0c0c;position:relative}
.pt{font-family:'Bebas Neue',sans-serif;font-size:34px;letter-spacing:4px;margin-bottom:6px}
.ps{font-size:11px;color:#444;letter-spacing:2px;text-transform:uppercase;margin-bottom:36px}
.ds{display:flex;gap:14px;margin-bottom:28px}
.dt{width:13px;height:13px;border-radius:50%;border:1px solid #252525;transition:all .2s}
.dt.on{background:#b41e1e;border-color:#b41e1e}
.pe{color:#c33;font-size:11px;letter-spacing:2px;margin-bottom:12px;min-height:16px;text-align:center}
.kp{display:grid;grid-template-columns:repeat(3,70px);gap:12px}
.k{height:70px;border-radius:50%;background:#141414;border:1px solid #1e1e1e;color:#eeeae3;font-size:22px;font-family:'DM Sans',sans-serif;cursor:pointer;transition:all .12s;display:flex;align-items:center;justify-content:center}
.k:active{background:#1f1f1f;transform:scale(.92)}.k.dl{font-size:18px;color:#555}
.aw{min-height:100vh;padding:0 0 60px;background:#0c0c0c}
.at{display:flex;align-items:center;justify-content:space-between;padding:22px 16px 0}
.atit{font-family:'Bebas Neue',sans-serif;font-size:30px;letter-spacing:4px}
.rb{background:none;border:1px solid #1e1e1e;color:#555;font-size:11px;letter-spacing:2px;text-transform:uppercase;padding:7px 14px;border-radius:5px;cursor:pointer;font-family:'DM Sans',sans-serif}
.rb:disabled{opacity:.35;cursor:default}
.sec{padding:0 16px;margin-top:22px}
.sl2{font-size:10px;letter-spacing:3px;text-transform:uppercase;color:#383838;margin-bottom:10px}
.pills{display:flex;gap:7px;flex-wrap:wrap;margin-bottom:10px}
.pill{padding:7px 15px;border-radius:20px;border:1px solid #1e1e1e;background:#0e0e0e;font-size:12px;color:#666;cursor:pointer;transition:all .15s;white-space:nowrap;font-family:'DM Sans',sans-serif}
.pill.on{background:#b41e1e;border-color:#b41e1e;color:#fff}
.cd2{display:flex;gap:8px;align-items:center;flex-wrap:wrap;margin-top:6px}
.di{background:#111;border:1px solid #222;color:#eeeae3;padding:8px 10px;border-radius:6px;font-size:12px;font-family:'DM Sans',sans-serif;flex:1;min-width:110px}
.ap{background:#b41e1e;border:none;color:#fff;padding:8px 18px;border-radius:6px;font-size:12px;cursor:pointer;font-family:'DM Sans',sans-serif}
.sp{display:flex;gap:6px;overflow-x:auto;padding-bottom:4px;scrollbar-width:none}
.sp::-webkit-scrollbar{display:none}
.spi{flex-shrink:0;padding:6px 12px;border-radius:16px;border:1px solid #1a1a1a;background:#0d0d0d;font-size:11px;color:#555;cursor:pointer;transition:all .15s;white-space:nowrap;font-family:'DM Sans',sans-serif}
.spi.on{border-color:#2a2a2a;color:#eeeae3;background:#1a1a1a}
.gd{display:flex;align-items:baseline;gap:10px;margin:16px 0 2px}
.gn{font-family:'Bebas Neue',sans-serif;font-size:64px;line-height:1}
.gl{font-size:11px;color:#444;letter-spacing:2px;line-height:1.7}
.br{margin-bottom:13px}.bt{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:5px}
.bn{font-size:13px;font-weight:500}.bv{font-family:'Bebas Neue',sans-serif;font-size:22px}
.btr{height:5px;background:#161616;border-radius:3px;overflow:hidden}
.bf{height:100%;border-radius:3px;transition:width .5s ease;background:#b41e1e}
.dc{display:flex;align-items:flex-end;gap:5px;overflow-x:auto;padding-bottom:4px;scrollbar-width:none}
.dc::-webkit-scrollbar{display:none}
.dco{display:flex;flex-direction:column;align-items:center;gap:3px;flex-shrink:0}
.dbw{display:flex;align-items:flex-end;height:56px}
.db2{width:30px;border-radius:3px 3px 0 0;background:#b41e1e;min-height:3px}
.dl2{font-size:9px;color:#383838;white-space:nowrap;margin-top:2px}
.dn{font-family:'Bebas Neue',sans-serif;font-size:13px;color:#666}
.dv{height:1px;background:#151515;margin:24px 0 0}
.em{text-align:center;color:#2a2a2a;font-size:13px;padding:40px 0;letter-spacing:1px}
.ld{text-align:center;color:#333;font-size:11px;letter-spacing:2px;padding:50px 0;animation:pls 1s ease-in-out infinite}
.tabs{display:flex;border-bottom:1px solid #1a1a1a;margin:0 16px;margin-top:22px}
.tab{padding:10px 18px;font-size:11px;letter-spacing:2px;text-transform:uppercase;color:#444;background:none;border:none;cursor:pointer;font-family:'DM Sans',sans-serif;border-bottom:2px solid transparent;margin-bottom:-1px;transition:all .2s}
.tab.on{color:#eeeae3;border-bottom-color:#b41e1e}
</style>
</head>
<body>
<div id="root"></div>
<script>
const{useState,useEffect,useCallback}=React;

const SCRIPT_URL="https://script.google.com/macros/s/AKfycbweOqQDMc9xA1nmzTsicRyJSJPiI_jpvbV9nqyN9esdf3SFu2yxJLxE-OttHIqqbbc/exec";
const STORES=["Andino","Gran Estacion","Hacienda","Santafe","Tesoro","Titan","Unicentro"];
const ADMIN_PIN="1116";

async function sheetsAdd(store,date){
  try{await fetch(`${SCRIPT_URL}?action=add&store=${encodeURIComponent(store)}&date=${date}&count=1`,{mode:"no-cors"});}catch(_){}
}
async function sheetsRead(sheet){
  try{const r=await fetch(`${SCRIPT_URL}?action=read&sheet=${sheet}`);const j=await r.json();return j.ok?(j.rows||[]):null;}catch(_){return null;}
}
function todayKey(){const d=new Date();return `${d.getFullYear()}-${p2(d.getMonth()+1)}-${p2(d.getDate())}`;}
function p2(n){return String(n).padStart(2,"0");}
function offsetKey(n){const d=new Date();d.setDate(d.getDate()+n);return `${d.getFullYear()}-${p2(d.getMonth()+1)}-${p2(d.getDate())}`;}
function fmt(k){const[,m,d]=k.split("-");const M=["Ene","Feb","Mar","Abr","May","Jun","Jul","Ago","Sep","Oct","Nov","Dic"];return `${+d} ${M[+m-1]}`;}
function fmtFull(k){const[y,m,d]=k.split("-");const M=["Ene","Feb","Mar","Abr","May","Jun","Jul","Ago","Sep","Oct","Nov","Dic"];return `${+d} ${M[+m-1]} ${y}`;}
function horasToDb(rows){
  const db={};
  rows.slice(1).forEach(r=>{
    const date=String(r[0]).slice(0,10),store=String(r[2]),n=Number(r[4])||0;
    if(!date||!store||n<=0)return;
    if(!db[date])db[date]={};
    db[date][store]=(db[date][store]||0)+n;
  });
  return db;
}

function App(){
  const[view,setView]=useState("home");
  const[store,setStore]=useState(null);
  const[count,setCount]=useState(0);
  const[status,setStatus]=useState("idle");
  const[lastTap,setLastTap]=useState(null);
  const[pulse,setPulse]=useState(false);
  const[pin,setPin]=useState("");
  const[pinErr,setPinErr]=useState(false);
  const[db,setDb]=useState({});
  const[rawRows,setRawRows]=useState([]);
  const[dbLoad,setDbLoad]=useState(false);
  const[period,setPeriod]=useState("today");
  const[cFrom,setCFrom]=useState(offsetKey(-30));
  const[cTo,setCTo]=useState(todayKey());
  const[fStore,setFStore]=useState("all");
  const[tab,setTab]=useState("resumen");

  useEffect(()=>{
    if(view!=="counter"||!store)return;
    setCount(0);setStatus("loading");setLastTap(null);
    sheetsRead("Horas").then(rows=>{
      if(rows){
        const t=todayKey();
        const c=rows.slice(1).filter(r=>String(r[0]).slice(0,10)===t&&String(r[2])===store).reduce((a,r)=>a+(Number(r[4])||0),0);
        setCount(c);
      }
      setStatus("idle");
    });
  },[view,store]);

  useEffect(()=>{
    if(pin.length!==4)return;
    if(pin===ADMIN_PIN){setPin("");setPinErr(false);openAdmin();}
    else{setPinErr(true);setPin("");}
  },[pin]);

  const openAdmin=async()=>{
    setView("admin");setDbLoad(true);
    const rows=await sheetsRead("Horas");
    if(rows){setRawRows(rows);setDb(horasToDb(rows));}
    setDbLoad(false);
  };

  const refresh=async()=>{
    setDbLoad(true);
    const rows=await sheetsRead("Horas");
    if(rows){setRawRows(rows);setDb(horasToDb(rows));}
    setDbLoad(false);
  };

  const handleTap=useCallback(()=>{
    setPulse(true);setTimeout(()=>setPulse(false),240);
    setCount(c=>c+1);setStatus("ok");
    setLastTap(new Date().toLocaleTimeString("es-CO",{hour:"2-digit",minute:"2-digit"}));
    sheetsAdd(store,todayKey());
  },[store]);

  const from=period==="today"?todayKey():period==="ayer"?offsetKey(-1):period==="week"?offsetKey(-6):period==="month"?offsetKey(-29):period==="year"?offsetKey(-364):cFrom;
  const to=period==="ayer"?offsetKey(-1):period==="custom"?cTo:todayKey();
  const days=Object.keys(db).filter(d=>d>=from&&d<=to).sort();
  const sf=fStore==="all"?STORES:[fStore];
  const totByStore={};
  STORES.forEach(s=>{totByStore[s]=days.reduce((a,d)=>a+(db[d]?.[s]||0),0);});
  const grand=sf.reduce((a,s)=>a+(totByStore[s]||0),0);
  const maxSt=Math.max(...sf.map(s=>totByStore[s]||0),1);
  const dayRows=days.map(d=>({d,v:sf.reduce((a,s)=>a+(db[d]?.[s]||0),0)}));
  const maxDay=Math.max(...dayRows.map(x=>x.v),1);
  const pLbl={today:"hoy",ayer:"ayer",week:"últimos 7 días",month:"últimos 30 días",year:"este año",custom:"en el período"};
  const HOURS=Array.from({length:14},(_,i)=>p2(i+8)+":00");
  const hmDays=[...new Set(rawRows.slice(1).map(r=>String(r[0]).slice(0,10)))].filter(d=>d>=from&&d<=to).sort().slice(-7);
  const hmData={};
  rawRows.slice(1).forEach(r=>{
    const date=String(r[0]).slice(0,10),hora=String(r[1]),s=String(r[2]),n=Number(r[4])||0;
    if(!hmDays.includes(date))return;
    if(fStore!=="all"&&s!==fStore)return;
    const k=`${date}|${hora}`;hmData[k]=(hmData[k]||0)+n;
  });
  const hmMax=Math.max(...Object.values(hmData),1);

  const e=React.createElement;

  if(view==="home") return e("div",{className:"home"},
    e("div",{className:"logo"},"THERMOS"),
    e("div",{className:"logo-sub"},"The Heating Movement"),
    e("div",{className:"hl"},"Selecciona tu tienda"),
    e("div",{className:"sgrid"},
      STORES.map(s=>e("button",{key:s,className:"sb",onClick:()=>{setStore(s);setView("counter");}},s))
    ),
    e("button",{className:"ae",onClick:()=>{setPin("");setPinErr(false);setView("pin");}},"↗ Administrador")
  );

  if(view==="counter") return e("div",{className:"ctr"},
    e("button",{className:"bk",onClick:()=>setView("home")},"←"),
    e("div",{className:"cs"},store),
    e("div",{className:"cds"},fmtFull(todayKey())),
    e("div",{className:"ring"},
      e("button",{className:`tb${pulse?" p":""}`,onClick:handleTap},
        e("div",{className:"tc"},count),
        e("div",{className:"tl"},"clientes hoy")
      )
    ),
    e("div",{className:"sr"},
      e("div",{className:`sd ${status}`}),
      e("span",{className:"sl"},status==="loading"?"cargando...":status==="ok"?"sincronizado ✓":status==="error"?"error de red":"")
    ),
    e("div",{className:"lt"},lastTap?`Último: ${lastTap}`:"Toca para registrar entrada")
  );

  if(view==="pin") return e("div",{className:"pw"},
    e("button",{className:"bk",onClick:()=>setView("home")},"←"),
    e("div",{className:"pt"},"Admin"),
    e("div",{className:"ps"},"Ingresa el PIN"),
    e("div",{className:"ds"},[0,1,2,3].map(i=>e("div",{key:i,className:`dt${pin.length>i?" on":""}`}))),
    e("div",{className:"pe"},pinErr?"PIN incorrecto":" "),
    e("div",{className:"kp"},
      ["1","2","3","4","5","6","7","8","9","","0","⌫"].map((k,i)=>{
        if(k==="")return e("div",{key:i});
        if(k==="⌫")return e("button",{key:i,className:"k dl",onClick:()=>setPin(p=>p.slice(0,-1))},"⌫");
        return e("button",{key:i,className:"k",onClick:()=>{if(pin.length<4)setPin(p=>p+k);}},k);
      })
    )
  );

  if(view==="admin") return e("div",{className:"aw"},
    e("div",{className:"at"},
      e("div",{style:{display:"flex",alignItems:"center",gap:14}},
        e("button",{className:"bk",style:{position:"static",padding:0},onClick:()=>setView("home")},"←"),
        e("div",{className:"atit"},"Tráfico THM")
      ),
      e("button",{className:"rb",disabled:dbLoad,onClick:refresh},dbLoad?"...":"↻ Actualizar")
    ),
    e("div",{className:"sec"},
      e("div",{className:"sl2"},"Período"),
      e("div",{className:"pills"},
        [["today","Hoy"],["ayer","Ayer"],["week","7 días"],["month","30 días"],["year","Este año"],["custom","Personalizado"]].map(([p,l])=>
          e("button",{key:p,className:`pill${period===p?" on":""}`,onClick:()=>setPeriod(p)},l)
        )
      ),
      period==="custom"&&e("div",{className:"cd2"},
        e("input",{type:"date",className:"di",value:cFrom,max:cTo,onChange:ev=>setCFrom(ev.target.value)}),
        e("span",{style:{color:"#333",fontSize:12}},"→"),
        e("input",{type:"date",className:"di",value:cTo,min:cFrom,max:todayKey(),onChange:ev=>setCTo(ev.target.value)}),
        e("button",{className:"ap",onClick:refresh},"Aplicar")
      )
    ),
    e("div",{className:"sec",style:{marginTop:16}},
      e("div",{className:"sl2"},"Tienda"),
      e("div",{className:"sp"},
        e("button",{className:`spi${fStore==="all"?" on":""}`,onClick:()=>setFStore("all")},"Todas"),
        STORES.map(s=>e("button",{key:s,className:`spi${fStore===s?" on":""}`,onClick:()=>setFStore(s)},s))
      )
    ),
    e("div",{className:"tabs"},
      e("button",{className:`tab${tab==="resumen"?" on":""}`,onClick:()=>setTab("resumen")},"Resumen"),
      e("button",{className:`tab${tab==="horas"?" on":""}`,onClick:()=>setTab("horas")},"Por horas"),
      e("button",{className:`tab${tab==="dias"?" on":""}`,onClick:()=>setTab("dias")},"Por días")
    ),
    dbLoad?e("div",{className:"ld"},"Cargando desde Google Sheets..."):e(React.Fragment,null,
      tab==="resumen"&&e(React.Fragment,null,
        e("div",{className:"sec"},
          e("div",{className:"gd"},
            e("div",{className:"gn"},grand),
            e("div",{className:"gl"},`clientes\n${pLbl[period]}`)
          )
        ),
        e("div",{className:"sec",style:{marginTop:22}},
          e("div",{className:"sl2"},"Ranking por tienda"),
          grand===0?e("div",{className:"em"},"Sin registros en este período"):
          sf.map(s=>({s,c:totByStore[s]||0})).sort((a,b)=>b.c-a.c).map(({s,c})=>
            e("div",{key:s,className:"br"},
              e("div",{className:"bt"},e("span",{className:"bn"},s),e("span",{className:"bv"},c)),
              e("div",{className:"btr"},e("div",{className:"bf",style:{width:`${Math.round((c/maxSt)*100)}%`}}))
            )
          )
        )
      ),
      tab==="horas"&&e("div",{className:"sec",style:{marginTop:22}},
        e("div",{className:"sl2"},"Tráfico por franja horaria"),
        hmDays.length===0?e("div",{className:"em"},"Sin registros en este período"):
        e("div",{style:{overflowX:"auto",paddingBottom:8}},
          e("div",{style:{display:"grid",gridTemplateColumns:`60px repeat(${HOURS.length},1fr)`,gap:"3px",minWidth:400}},
            e("div",null),
            ...HOURS.map(h=>e("div",{key:h,style:{fontSize:9,color:"#333",textAlign:"center"}},h.slice(0,2)+"h")),
            ...hmDays.flatMap(d=>[
              e("div",{key:"l"+d,style:{fontSize:9,color:"#444",display:"flex",alignItems:"center",paddingRight:6,whiteSpace:"nowrap"}},fmt(d)),
              ...HOURS.map(h=>{
                const v=hmData[`${d}|${h}`]||0;
                const intensity=v>0?Math.max(0.15,v/hmMax):0;
                return e("div",{key:h+d,style:{height:22,borderRadius:3,background:v>0?`rgba(180,30,30,${intensity})`:"#111",display:"flex",alignItems:"center",justifyContent:"center"}},
                  v>0&&e("span",{style:{fontSize:8,color:`rgba(255,220,220,${Math.min(1,intensity+0.4)})`}},v)
                );
              })
            ])
          )
        )
      ),
      tab==="dias"&&e("div",{className:"sec",style:{marginTop:22}},
        e("div",{className:"sl2"},"Evolución diaria"),
        dayRows.length===0?e("div",{className:"em"},"Sin registros en este período"):
        e(React.Fragment,null,
          e("div",{className:"dc"},
            dayRows.map(({d,v})=>e("div",{key:d,className:"dco"},
              e("div",{className:"dn"},v>0?v:""),
              e("div",{className:"dbw"},e("div",{className:"db2",style:{height:`${Math.max(3,Math.round((v/maxDay)*52))}px`}})),
              e("div",{className:"dl2"},fmt(d))
            ))
          ),
          fStore!=="all"&&e(React.Fragment,null,
            e("div",{className:"dv"}),
            e("div",{style:{marginTop:18}},
              e("div",{className:"sl2"},`Día a día — ${fStore}`),
              [...days].reverse().map(d=>{
                const c=db[d]?.[fStore]||0;
                return e("div",{key:d,className:"br"},
                  e("div",{className:"bt"},
                    e("span",{className:"bn",style:{fontSize:12,color:"#666"}},fmtFull(d)),
                    e("span",{className:"bv"},c)
                  ),
                  e("div",{className:"btr"},e("div",{className:"bf",style:{width:`${c>0?Math.max(4,Math.round((c/maxDay)*100)):0}%`}}))
                );
              })
            )
          )
        )
      )
    )
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(React.createElement(App));
</script>
</body>
</html>
